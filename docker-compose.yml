
services:
  # ========== BOOKING MICROSERVICE ==========
  booking-service:
    build: ./booking-microservice                 # Builds from YOUR Dockerfile
    container_name: booking-app
    ports:
      - "3002:3000"                           # Access at localhost:3002
    environment:
      - DB_HOST=booking-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=bookingdb
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - app-network

  booking-db:
    image: mysql:8.0 #pulls sql from docker registry
    container_name: booking-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bookingdb
    volumes:
      - booking-data:/var/lib/mysql
      - ./booking-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ========== BOOKING COMPOSITE SERVICE ==========
  booking-composite-service:
    build: ./booking-composite-service
    container_name: booking-composite-app
    ports:
      - "3010:3001"  # Access at localhost:3010
    environment:
      - PORT=3001
      - BOOKING_SERVICE_URL=http://booking-service:3000
      - PASSENGER_SERVICE_URL=http://passenger-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - PAYMENT_SERVICE_URL=http://payment-service:3000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
    depends_on:
      - booking-service
    networks:
      - app-network
    restart: unless-stopped

  # ========== FLIGHT SERVICE ==========
  

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build: ./payment-microservice                 
    container_name: payment-app
    ports:
      - "5001:5000"                               # Access at localhost:5001
    environment:
      - DB_HOST=payment-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=paymentdb
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - app-network

  payment-db:
    image: mysql:8.0 
    container_name: payment-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=paymentdb
      - TZ=Asia/Singapore
    volumes:
      - payment-data:/var/lib/mysql
      - ./payment-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== NOTIFICATION SERVICE ==========


  # ========== RABBITMQ ==========
  

networks:
  app-network:
    driver: bridge

volumes:
  booking-data:
  flight-data:
  payment-data: