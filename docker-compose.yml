services:
  # ========== RECORD MICROSERVICE ==========
  record-service:
    build: ./record-microservice
    container_name: record-app
    restart: unless-stopped
    ports:
      - "3002:3000"                               # Access at localhost:3002
    environment:
      - DB_HOST=record-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=recorddb
    depends_on:
      record-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  record-db:
    image: mysql:8.0
    container_name: record-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=recorddb
      - TZ=Asia/Singapore
    volumes:
      - record-data:/var/lib/mysql
      - ./record-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== BOOKING COMPOSITE SERVICE ==========
  booking-composite-service:
    build: ./booking-composite-service
    container_name: booking-composite-app
    restart: unless-stopped
    ports:
      - "3010:3001"                               # Access at localhost:3010
    environment:
      - PORT=3001
      - RECORD_SERVICE_URL=http://record-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - PAYMENT_SERVICE_URL=http://payment-service:5000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - MILES_EARN_SERVICE_URL=http://miles-earn-service:5009
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PASSENGER_SERVICE_URL=https://personal-4whagfbm.outsystemscloud.com/Passenger_Srv/rest/PassengerAPI/  # OutSystems
    depends_on:
      record-service:
        condition: service_started
      flight-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      miles-earn-service:
        condition: service_started
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m
    networks:
      - app-network

  # ========== FLIGHT SERVICE ==========
  flight-service:
    build: ./flight-microservice
    container_name: flight-app
    restart: unless-stopped
    ports:
      - "3003:3000"                               # Access at localhost:3003
    environment:
      - DB_HOST=flight-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=flightdb
      - BOOKING_COMPOSITE_URL=http://booking-composite-service:3001
      - AUTO_LAND_ENABLED=true
      - AUTO_LAND_INTERVAL_SECONDS=60
    depends_on:
      flight-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    networks:
      - app-network

  flight-db:
    image: mysql:8.0
    container_name: flight-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=flightdb
      - TZ=Asia/Singapore
    volumes:
      - flight-data:/var/lib/mysql
      - ./flight-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== SEATS SERVICE ==========
  seats-service:
    build: ./seats-microservice
    container_name: seats-app
    restart: unless-stopped
    ports:
      - "5003:5003"                               # Access at localhost:5003
    environment:
      - DB_HOST=seats-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=seats
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=airline_events
      - SEAT_EVENTS_KEY=seat.updated
    depends_on:
      seats-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5003/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  seats-db:
    image: mysql:8.0
    container_name: seats-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword          # fixed: was 'root', now consistent with all other DBs
      - MYSQL_DATABASE=seats
      - TZ=Asia/Singapore
    ports:
      - "3309:3306"
    volumes:
      - seats-data:/var/lib/mysql
      - ./seats-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build: ./payment-microservice
    container_name: payment-app
    restart: unless-stopped
    ports:
      - "5001:5000"                               # Access at localhost:5001
    environment:
      - DB_HOST=payment-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=paymentdb
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=paymentdb
      - TZ=Asia/Singapore
    volumes:
      - payment-data:/var/lib/mysql
      - ./payment-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== OFFER MICROSERVICE ==========
  offer-service:
    build: ./offer-microservice
    container_name: offer-app
    restart: unless-stopped
    ports:
      - "5002:5000"                               # Access at localhost:5002
    environment:
      - DB_HOST=offer-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=offerdb
    depends_on:
      offer-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  offer-db:
    image: mysql:8.0
    container_name: offer-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=offerdb
      - TZ=Asia/Singapore
    volumes:
      - offer-data:/var/lib/mysql
      - ./offer-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== FLIGHT CANCELLATION COMPOSITE SERVICE ==========
  flight-cancellation-composite:
    build: ./flight-cancellation-composite
    container_name: flight-cancellation-app
    restart: unless-stopped
    ports:
      - "5010:5010"
    environment:
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - SEATS_SERVICE_URL=http://seats-service:5003
      - PORT=5010
      - FLASK_ENV=development
    depends_on:
      flight-service:
        condition: service_started
      seats-service:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5010/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  # ========== FLIGHT SEARCH COMPOSITE SERVICE ==========
  flight-search-composite:
    build: ./flight-search-composite
    container_name: flight-search-app
    restart: unless-stopped
    ports:
      - "5011:5011"
    environment:
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - SEATS_SERVICE_URL=http://seats-service:5003
      - PORT=5011
      - FLASK_ENV=development
    depends_on:
      flight-service:
        condition: service_started
      seats-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5011/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  # ========== REALTIME GATEWAY (WebSocket) ==========
  realtime-gateway:
    build: ./realtime-gateway
    container_name: realtime-gateway
    restart: unless-stopped
    ports:
      - "5012:5012"
    environment:
      - PORT=5012
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=airline_events
      - SEAT_EVENTS_KEY=seat.updated
    depends_on:
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5012/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  kong-db:
    image: postgres:17.4
    container_name: kong-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_DB=kong
      - POSTGRES_PASSWORD=kong
    volumes:
      - kong-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  kong-migration:
    image: kong/kong-gateway:3.9
    container_name: kong-migration
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-db
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_PG_DATABASE=kong
    command:
      - /bin/sh
      - -c
      - kong migrations bootstrap || (kong migrations up && kong migrations finish)
    restart: "no"
    mem_limit: 256m
    networks:
      - app-network

  kong:
    image: kong/kong-gateway:3.9
    container_name: kong
    restart: unless-stopped
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-db
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_PG_DATABASE=kong
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_GUI_LISTEN=0.0.0.0:8002
      - KONG_ADMIN_GUI_URL=http://localhost:8002
      - KONG_ADMIN_GUI_API_URL=http://localhost:8001
      - KONG_LOG_LEVEL=notice
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    mem_limit: 1g
    networks:
      - app-network

  kong-setup:
    image: curlimages/curl:8.7.1
    container_name: kong-setup
    depends_on:
      kong:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap.sh"]
    environment:
      - KONG_ADMIN_URL=http://kong:8001
    volumes:
      - ./kong/bootstrap.sh:/bootstrap/bootstrap.sh:ro
    restart: "no"
    mem_limit: 64m
    networks:
      - app-network

  # ========== NOTIFICATION SERVICE (Atomic) ==========
  # Subscribes to RabbitMQ (booking.confirmed) and Kafka (flight.cancelled.alt/noalt)
  # Calls Email Service via HTTP — does NOT call SendGrid directly
  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "3004:3004"                               # Access at localhost:3004
    environment:
      - FLASK_PORT=3004
      - FLASK_ENV=development
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - RABBITMQ_EXCHANGE=airline_events
      # - EMAIL_SERVICE_URL=http://email-service:3005
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
    depends_on:
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3004/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network

  # ========== RABBITMQ ==========
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"                               # AMQP host port remapped to avoid conflicts
      - "15673:15672"                             # Management UI → http://localhost:15673
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    mem_limit: 512m
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 150s

  # ========== ZOOKEEPER (required by Kafka) ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    mem_limit: 256m
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== KAFKA ==========
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"                               # Access at localhost:9092
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    mem_limit: 512m
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic flight.cancelled --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic passenger.rebook.alt --partitions 3 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic passenger.rebook.noalt --partitions 3 --replication-factor 1"
    mem_limit: 256m
    networks:
      - app-network

  rebooking_composite:
    build: ./rebooking_composite
    container_name: rebooking-composite
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - SEAT_SERVICE_URL=http://seats-service:5003
      - RECORD_SERVICE_URL=http://record-service:3000
    depends_on:
      kafka:
        condition: service_healthy
      flight-service:
        condition: service_healthy
      seats-service:
        condition: service_healthy
      record-service:
        condition: service_healthy
      offer-service:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    deploy:
      replicas: 1
    mem_limit: 256m
    networks:
      - app-network

  worker_a_composite:
    build: ./worker_a_composite
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SEAT_SERVICE_URL=http://seats-service:5003
      - PASSENGER_SERVICE_URL=https://personal-4whagfbm.outsystemscloud.com/Passenger_Srv/rest/PassengerAPI
      - OFFER_SERVICE_URL=http://offer-service:5000
      - RECORD_SERVICE_URL=http://record-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - FRONTEND_BASE_URL=http://localhost:5173
    depends_on:
      kafka:
        condition: service_healthy
      seats-service:
        condition: service_healthy
      offer-service:
        condition: service_healthy
      record-service:
        condition: service_healthy
      flight-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    deploy:
      replicas: 5
    mem_limit: 128m
    networks:
      - app-network

  worker_b_composite:
    build: ./worker_b_composite
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PASSENGER_SERVICE_URL=https://personal-4whagfbm.outsystemscloud.com/Passenger_Srv/rest/PassengerAPI
      - PAYMENT_SERVICE_URL=http://payment-service:5000
      - RECORD_SERVICE_URL=http://record-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      record-service:
        condition: service_healthy
      flight-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    deploy:
      replicas: 5
    mem_limit: 128m
    networks:
      - app-network
  
  # ========== MILES BALANCE SERVICE ==========
  miles-balance-service:
    build: ./miles-balance-microservice           # ✅ Changed from miles-balance-service
    container_name: miles-balance-app
    ports:
      - "5006:5006"
    environment:
      - DB_HOST=miles-balance-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=miles_balance_db
    depends_on:
      miles-balance-db:
        condition: service_healthy
    mem_limit: 256m
    networks:
      - app-network
    restart: unless-stopped

  miles-balance-db:
    image: mysql:8.0
    container_name: miles-balance-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=miles_balance_db
    volumes:
      - miles-balance-data:/var/lib/mysql
      - ./miles-balance-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql   # ✅ Changed
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MILES TRANSACTION SERVICE ==========
  miles-transaction-service:
    build: ./miles-transaction-microservice       # ✅ Changed
    container_name: miles-transaction-app
    ports:
      - "5007:5007"
    environment:
      - DB_HOST=miles-transaction-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=miles_transaction_db
    depends_on:
      miles-transaction-db:
        condition: service_healthy
    mem_limit: 256m
    networks:
      - app-network
    restart: unless-stopped

  miles-transaction-db:
    image: mysql:8.0
    container_name: miles-transaction-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=miles_transaction_db
    volumes:
      - miles-transaction-data:/var/lib/mysql
      - ./miles-transaction-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql   # ✅ Changed
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== VOUCHER SERVICE ==========
  voucher-service:
    build: ./voucher-microservice                 # ✅ Changed
    container_name: voucher-app
    ports:
      - "5005:5005"
    environment:
      - DB_HOST=voucher-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=voucher_db
      - EXTERNAL_VOUCHER_MODE=${EXTERNAL_VOUCHER_MODE:-tremendous}
      - TREMENDOUS_API_URL=${TREMENDOUS_API_URL:-https://testflight.tremendous.com/api/v2}
      - TREMENDOUS_API_KEY=${TREMENDOUS_API_KEY}
      - TREMENDOUS_FUNDING_SOURCE_ID=${TREMENDOUS_FUNDING_SOURCE_ID}
      - TREMENDOUS_CAMPAIGN_ID=${TREMENDOUS_CAMPAIGN_ID}
    depends_on:
      voucher-db:
        condition: service_healthy
    mem_limit: 256m
    networks:
      - app-network
    restart: unless-stopped

  voucher-db:
    image: mysql:8.0
    container_name: voucher-db
    command: --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=voucher_db
    volumes:
      - voucher-data:/var/lib/mysql
      - ./voucher-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql   # ✅ Changed
    networks:
      - app-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MILES EARN SERVICE ==========
  miles-earn-service:
    build: ./miles-earn-microservice
    container_name: miles-earn-app
    ports:
      - "5009:5009"
    environment:
      - PORT=5009
      - MILES_PER_DOLLAR=1
      - MILES_BALANCE_URL=http://miles-balance-service:5006
      - MILES_TRANSACTION_URL=http://miles-transaction-service:5007
    depends_on:
      miles-balance-service:
        condition: service_started
      miles-transaction-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5009/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - app-network
    restart: unless-stopped

  # ========== LOYALTY COMPOSITE SERVICE ==========
  loyalty-composite-service:
    build: ./loyalty-composite-service           # ✅ This one matches your folder name
    container_name: loyalty-composite-app
    ports:
      - "5008:5008"
    environment:
      - MILES_BALANCE_URL=http://miles-balance-service:5006
      - MILES_TRANSACTION_URL=http://miles-transaction-service:5007
      - VOUCHER_URL=http://voucher-service:5005
      - NOTIFICATION_URL=http://notification-service:3004
    depends_on:
      - miles-balance-service
      - miles-transaction-service
      - voucher-service
      - notification-service
    mem_limit: 256m
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge

volumes:
  record-data:
  flight-data:
  seats-data:
  payment-data:
  offer-data:
  kong-data:
  miles-balance-data:
  miles-transaction-data:
  voucher-data:
