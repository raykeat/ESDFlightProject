services:
  # ========== BOOKING MICROSERVICE ==========
  booking-service:
    build: ./booking-microservice
    container_name: booking-app
    restart: unless-stopped
    ports:
      - "3002:3000"                               # Access at localhost:3002
    environment:
      - DB_HOST=booking-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=bookingdb
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - app-network

  booking-db:
    image: mysql:8.0
    container_name: booking-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bookingdb
      - TZ=Asia/Singapore
    volumes:
      - booking-data:/var/lib/mysql
      - ./booking-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== BOOKING COMPOSITE SERVICE ==========
  booking-composite-service:
    build: ./booking-composite-service
    container_name: booking-composite-app
    ports:
      - "3010:3001"                               # Access at localhost:3010
    environment:
      - PORT=3001
      - BOOKING_SERVICE_URL=http://booking-service:3000
      - PASSENGER_SERVICE_URL=http://passenger-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - PAYMENT_SERVICE_URL=http://payment-service:5000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PASSENGER_SERVICE_URL=https://personal-4whagfbm.outsystemscloud.com/Passenger_Srv/rest/PassengerAPI/#/
    depends_on:
      - booking-service
    networks:
      - app-network
    restart: unless-stopped

  # ========== FLIGHT SERVICE ==========
  # TODO: add when ready

  # ========== SEATS SERVICE ==========
  seats-service:
    build: ./seats-microservice
    ports:
      - "5003:5000"
    depends_on:
      - seats-db

  seats-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seats
    ports:
      - "3309:3306"

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build: ./payment-microservice
    container_name: payment-app
    restart: unless-stopped
    ports:
      - "5001:5000"                               # Access at localhost:5001
    environment:
      - DB_HOST=payment-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=paymentdb
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - app-network

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=paymentdb
      - TZ=Asia/Singapore
    volumes:
      - payment-data:/var/lib/mysql
      - ./payment-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== OFFER MICROSERVICE ==========
  offer-service:
    build: ./offer-microservice
    container_name: offer-app
    restart: unless-stopped
    ports:
      - "5002:5000"                               # Access at localhost:5002
    environment:
      - DB_HOST=offer-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=offerdb
    depends_on:
      offer-db:
        condition: service_healthy
    networks:
      - app-network

  offer-db:
    image: mysql:8.0
    container_name: offer-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=offerdb
      - TZ=Asia/Singapore
    volumes:
      - offer-data:/var/lib/mysql
      - ./offer-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== NOTIFICATION SERVICE (Composite) ==========
  # Consumes RabbitMQ/Kafka events and calls Email Service
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      - FLASK_PORT=3004
      - FLASK_ENV=development
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - RABBITMQ_EXCHANGE=airline_events
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EMAIL_SERVICE_URL=http://email-service:3005   # calls email-service, NOT SendGrid directly
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      email-service:                                   # wait for email-service to be ready
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
 
  # ========== EMAIL SERVICE (Atomic) ==========
  # Wrapper around SendGrid API — stateless, no DB
  email-service:
    build: ./email-service
    container_name: email-service
    ports:
      - "3005:3005"
    environment:
      - FLASK_PORT=3005
      - FLASK_ENV=development
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}           # from .env at project root
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
    networks:
      - app-network
    restart: unless-stopped
 
  # ========== RABBITMQ ==========
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"                           # AMQP — used by services
      - "15672:15672"                         # Management UI → http://localhost:15672
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ========== ZOOKEEPER (required by Kafka) ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== KAFKA ==========
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  booking-data:
  flight-data:
  payment-data:
  offer-data: