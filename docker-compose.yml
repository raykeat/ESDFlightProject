
services:
  # ========== BOOKING MICROSERVICE ==========
  booking-service:
    build: ./booking-microservice                 # Builds from YOUR Dockerfile
    container_name: booking-app
    ports:
      - "3002:3000"                           # Access at localhost:3002
    environment:
      - DB_HOST=booking-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=bookingdb
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - app-network

  booking-db:
    image: mysql:8.0 #pulls sql from docker registry
    container_name: booking-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bookingdb
    volumes:
      - booking-data:/var/lib/mysql
      - ./booking-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ========== BOOKING COMPOSITE SERVICE ==========
  booking-composite-service:
    build: ./booking-composite-service
    container_name: booking-composite-app
    ports:
      - "3010:3001"  # Access at localhost:3010
    environment:
      - PORT=3001
      - BOOKING_SERVICE_URL=http://booking-service:3000
      - PASSENGER_SERVICE_URL=http://passenger-service:3000
      - FLIGHT_SERVICE_URL=http://flight-service:3000
      - PAYMENT_SERVICE_URL=http://payment-service:5000
      - NOTIFICATION_SERVICE_URL=http://notification-service:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - booking-service
    networks:
      - app-network
    restart: unless-stopped

  # ========== FLIGHT SERVICE ==========
  

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build: ./payment-microservice                 
    container_name: payment-app
    ports:
      - "5001:5000"                               # Access at localhost:5001
    environment:
      - DB_HOST=payment-db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=paymentdb
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - app-network

  payment-db:
    image: mysql:8.0 
    container_name: payment-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=paymentdb
      - TZ=Asia/Singapore
    volumes:
      - payment-data:/var/lib/mysql
      - ./payment-microservice/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./notification-service             # points to notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "3004:3004"                           # Access at localhost:3004
    environment:
      - FLASK_PORT=3004
      - FLASK_ENV=development
      - RABBITMQ_HOST=rabbitmq                
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - RABBITMQ_EXCHANGE=airline_events
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
 
  # ========== RABBITMQ ==========
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"                           # AMQP — used by services
      - "15672:15672"                         # Management UI → http://localhost:15672
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== ZOOKEEPER (required by Kafka) ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
 
  # ========== KAFKA ==========
  # Used by: Scenario 2 (flight.cancelled.alt / flight.cancelled.noalt)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"                           # EXTERNAL — for services outside Docker
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      # INTERNAL: container-to-container communication (e.g. notification-service → kafka)
      # EXTERNAL: host machine communication (e.g. other microservices not yet in Docker)
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092  
      # ,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
  

networks:
  app-network:
    driver: bridge

volumes:
  booking-data:
  flight-data:
  payment-data: