openapi: 3.0.3
info:
  title: Record Microservice API
  version: 1.0.0
  description: API documentation for the record microservice.
servers:
  - url: http://localhost:3002
    description: Docker host mapping from docker-compose
  - url: http://localhost:3000
    description: Direct service port (non-docker local run)
tags:
  - name: Health
  - name: Bookings
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  service:
                    type: string
                    example: record-service

  /records:
    post:
      tags: [Bookings]
      summary: Create a booking record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBookingResponse'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

    get:
      tags: [Bookings]
      summary: Get booking records by flight ID
      parameters:
        - in: query
          name: flightID
          required: true
          schema:
            type: integer
          description: Flight ID used to filter records.
      responses:
        '200':
          description: Record list for the given flight
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

  /records/{bookingID}:
    get:
      tags: [Bookings]
      summary: Get booking record by booking ID
      parameters:
        - in: path
          name: bookingID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Record found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

  /records/{bookingID}/status:
    put:
      tags: [Bookings]
      summary: Update booking record status
      parameters:
        - in: path
          name: bookingID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

  /records/passenger/{passengerID}:
    get:
      tags: [Bookings]
      summary: Get booking records by passenger ID
      parameters:
        - in: path
          name: passengerID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Records found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

  /record/{bookingID}:
    delete:
      tags: [Bookings]
      summary: Delete booking by booking ID
      parameters:
        - in: path
          name: bookingID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Record deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Database or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'

components:
  schemas:
    Booking:
      type: object
      properties:
        bookingID:
          type: integer
          example: 1
        flightID:
          type: integer
          example: 36251
        seatID:
          type: integer
          example: 5000
        passengerID:
          type: integer
          example: 1
        amountPaid:
          type: number
          format: decimal
          example: 385.50
        bookingstatus:
          type: string
          example: Confirmed
        createdTime:
          type: string
          format: date-time
          example: '2025-03-10T09:15:22Z'

    CreateBookingRequest:
      type: object
      required: [passengerID, flightID, seatID, amountPaid]
      properties:
        passengerID:
          type: integer
          example: 1
        flightID:
          type: integer
          example: 36251
        seatID:
          type: integer
          example: 5000
        amountPaid:
          type: number
          format: decimal
          example: 385.50

    CreateBookingResponse:
      type: object
      properties:
        bookingID:
          type: integer
          example: 12
        bookingstatus:
          type: string
          example: Pending
        message:
          type: string
          example: Booking created successfully

    UpdateBookingStatusRequest:
      type: object
      required: [bookingstatus]
      properties:
        bookingstatus:
          type: string
          example: Confirmed

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Booking status updated successfully

    SimpleError:
      type: object
      properties:
        error:
          type: string
          example: Record not found
